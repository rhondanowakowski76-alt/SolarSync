# fly.toml — SolarSync (single service: API + front-end), Sydney region
app = "solarsync"
primary_region = "syd"          # Sydney, Australia — data stays in AU

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_PATH = "/data/solarsync.db"   # lives on the persistent volume below

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

# Persistent volume so the SQLite database survives redeploys.
# Create once with:  fly volumes create solarsync_data --region syd --size 1
[mounts]
  source = "solarsync_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
